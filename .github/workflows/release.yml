name: release

# Builds sdist + wheel on every tag matching v*, and (when PyPI trusted
# publishing is configured for this repo at https://pypi.org/manage/account/publishing/)
# uploads them to PyPI via OIDC — no long-lived secrets, no twine tokens.
#
# Before first release:
#   1. Create the `standl` project on PyPI (one-time).
#   2. At https://pypi.org/manage/project/standl/settings/publishing/, add a
#      trusted publisher pointing at this workflow's environment (name: pypi).
#   3. `git tag v0.2.0 && git push --tags` — this workflow takes it from there.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI (OIDC)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
