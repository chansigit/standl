<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" role="img" aria-label="standl">
  <defs>
    <linearGradient id="funnel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B6DD6"/>
      <stop offset="1" stop-color="#2D3A8C"/>
    </linearGradient>
    <linearGradient id="cell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6AD55"/>
      <stop offset="1" stop-color="#ED8936"/>
    </linearGradient>
  </defs>

  <!-- Icon: three source tiles funneling into a single cell output -->
  <g transform="translate(18,18)">
    <!-- Top row: three source repo tiles -->
    <rect x="2"  y="6"  width="24" height="24" rx="5" fill="#38B2AC" opacity="0.95"/>
    <rect x="38" y="0"  width="28" height="28" rx="5" fill="#4FD1C5"/>
    <rect x="78" y="6"  width="24" height="24" rx="5" fill="#38B2AC" opacity="0.95"/>

    <!-- Tiny dots inside tiles to hint at data rows -->
    <circle cx="8"  cy="14" r="1.6" fill="#0F3B3A"/>
    <circle cx="16" cy="14" r="1.6" fill="#0F3B3A"/>
    <circle cx="8"  cy="22" r="1.6" fill="#0F3B3A"/>
    <circle cx="44" cy="10" r="1.8" fill="#1A3A3A"/>
    <circle cx="54" cy="10" r="1.8" fill="#1A3A3A"/>
    <circle cx="44" cy="20" r="1.8" fill="#1A3A3A"/>
    <circle cx="54" cy="20" r="1.8" fill="#1A3A3A"/>
    <circle cx="84" cy="14" r="1.6" fill="#0F3B3A"/>
    <circle cx="92" cy="14" r="1.6" fill="#0F3B3A"/>
    <circle cx="84" cy="22" r="1.6" fill="#0F3B3A"/>

    <!-- Funnel: trapezoid narrowing down -->
    <path d="M -2 38 L 106 38 L 72 80 L 32 80 Z" fill="url(#funnel)"/>

    <!-- Funnel neck + stem -->
    <rect x="44" y="80" width="16" height="8" fill="#2D3A8C"/>

    <!-- Output: a cell (h5ad) -->
    <circle cx="52" cy="102" r="10" fill="url(#cell)"/>
    <circle cx="48" cy="99"  r="2.4" fill="#C05621"/>
    <circle cx="55" cy="104" r="1.8" fill="#C05621"/>
    <circle cx="50" cy="106" r="1.4" fill="#C05621"/>
  </g>

  <!-- Wordmark -->
  <g font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
     font-weight="700" fill="#1A202C">
    <text x="150" y="76" font-size="52" letter-spacing="-1.5">standl</text>
  </g>

  <!-- Tagline -->
  <g font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
     font-size="13" fill="#4A5568" font-weight="500">
    <text x="152" y="104">single-cell · download + design extraction</text>
  </g>
</svg>
